<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"
    <title></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .topo{
            background-color: #ffc107;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            border: 4px solid #01026b;
        }
        .painel{
            background: #404042;
            padding: 10;
            margin-bottom: 10px;
            border: 3px solid #1e1e1e;
        }
    </style>

</head>

<body class="bg-primary bg-gradient">
<div id="Alert"><br></div>

<div class="container mt-3">
    <div class="topo"> CAiXA LIVRE </div>

    <div class="row mt-3">
        
        <div class="col md-7">
            <h3 class="text-white"><span class="badge text-bg-primary"> SUA COMPRA</span></h3>
            <ul id="lista" class="list-group lista"> <li><br></li></ul>
        </div>
    

        <div class="col-md-5">
            <div class="painel"> TOTAL: R$ <sapan id="Total"> 0.00 </sapan></div>
       

            <div class="painel">
                <label> Codigo de Barras </label>
                <input type="text" id="cod" class="from-control">
            </div>

            <div class="painel">
                <label> Quantidade </label>
                <input type="text" id="qtd" class="from-control" value="1">
            </div>

            <div class="painel">
                <label> Quantidade X Valor </label>
                <div class="alert alert-light" reole="alert"><span id="qtdXvl"> 0.00</span></div>
            </div>

            <button class="btn btn-success w-100" onclick="=addProduto()">
                Adicionar Produto
            </button>
        </div>

    </div>

</div>
</body>

</html>
